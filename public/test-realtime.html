<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Messaging Test</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-connected {
            background: var(--success-100);
            color: var(--success-600);
        }
        .status-disconnected {
            background: var(--error-100);
            color: var(--error-600);
        }
        .test-controls {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .test-controls button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--primary-500);
            color: white;
            cursor: pointer;
        }
        .test-controls button:hover {
            background: var(--primary-600);
        }
        .log-container {
            background: var(--neutral-50);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        .log-entry.info {
            color: var(--primary-600);
        }
        .log-entry.success {
            color: var(--success-600);
        }
        .log-entry.error {
            color: var(--error-600);
        }
        .log-entry.warning {
            color: var(--warning-600);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔌 Real-time Messaging Test</h1>
        
        <div class="test-section">
            <h2>Connection Status</h2>
            <div>
                <span class="status-indicator status-disconnected" id="connectionStatus">🔴 Disconnected</span>
                <span id="connectionInfo">Not connected</span>
            </div>
        </div>
        
        <div class="test-section">
            <h2>Test Controls</h2>
            <div class="test-controls">
                <button onclick="connectSocket()">Connect</button>
                <button onclick="disconnectSocket()">Disconnect</button>
                <button onclick="joinTestChat()">Join Test Chat</button>
                <button onclick="leaveTestChat()">Leave Test Chat</button>
                <button onclick="sendTestMessage()">Send Test Message</button>
                <button onclick="toggleTyping()">Toggle Typing</button>
            </div>
        </div>
        
        <div class="test-section">
            <h2>Handoff Mode Test</h2>
            <div class="test-controls">
                <button onclick="toggleHandoffMode()" id="handoffModeBtn">🤖 AI Mode</button>
            </div>
        </div>
        
        <div class="test-section">
            <h2>Event Log</h2>
            <div class="log-container" id="eventLog">
                <div class="log-entry info">Ready to test real-time features...</div>
            </div>
            <button onclick="clearLog()" style="margin-top: 10px;">Clear Log</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let isConnected = false;
        let isTyping = false;
        let isLiveMode = false;
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('eventLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function updateConnectionStatus(connected) {
            isConnected = connected;
            const statusElement = document.getElementById('connectionStatus');
            const infoElement = document.getElementById('connectionInfo');
            
            if (connected) {
                statusElement.textContent = '🟢 Connected';
                statusElement.className = 'status-indicator status-connected';
                infoElement.textContent = 'Connected to real-time server';
            } else {
                statusElement.textContent = '🔴 Disconnected';
                statusElement.className = 'status-indicator status-disconnected';
                infoElement.textContent = 'Not connected';
            }
        }
        
        function connectSocket() {
            if (socket) {
                log('Already connected', 'warning');
                return;
            }
            
            log('Connecting to Socket.IO server...', 'info');
            
            socket = io({
                auth: {
                    userId: 'test-user-' + Date.now()
                },
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                log('✅ Connected to server', 'success');
                updateConnectionStatus(true);
            });
            
            socket.on('disconnect', () => {
                log('❌ Disconnected from server', 'error');
                updateConnectionStatus(false);
            });
            
            socket.on('connect_error', (error) => {
                log(`❌ Connection error: ${error.message}`, 'error');
            });
            
            socket.on('new_message', (data) => {
                log(`📨 New message: ${data.text_body}`, 'info');
            });
            
            socket.on('typing_start', (data) => {
                log(`⌨️ User ${data.userId} started typing`, 'info');
            });
            
            socket.on('typing_stop', (data) => {
                log(`⌨️ User ${data.userId} stopped typing`, 'info');
            });
            
            socket.on('live_mode_changed', (data) => {
                log(`🔄 Live mode changed: ${data.isLive ? 'ON' : 'OFF'}`, 'info');
            });
            
            socket.on('user_online', (data) => {
                log(`👤 User ${data.userId} came online`, 'success');
            });
            
            socket.on('user_offline', (data) => {
                log(`👤 User ${data.userId} went offline`, 'warning');
            });
            
            socket.on('message_error', (error) => {
                log(`❌ Message error: ${error.error}`, 'error');
            });
        }
        
        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log('Disconnected from server', 'info');
                updateConnectionStatus(false);
            } else {
                log('Not connected', 'warning');
            }
        }
        
        function joinTestChat() {
            if (!socket || !isConnected) {
                log('Not connected to server', 'error');
                return;
            }
            
            socket.emit('join_chat', { phone: 'test-phone' });
            log('Joined test chat room', 'success');
        }
        
        function leaveTestChat() {
            if (!socket || !isConnected) {
                log('Not connected to server', 'error');
                return;
            }
            
            socket.emit('leave_chat', { phone: 'test-phone' });
            log('Left test chat room', 'info');
        }
        
        function sendTestMessage() {
            if (!socket || !isConnected) {
                log('Not connected to server', 'error');
                return;
            }
            
            const message = `Test message at ${new Date().toLocaleTimeString()}`;
            socket.emit('send_message', { 
                phone: 'test-phone', 
                message: message,
                type: 'text'
            });
            log(`📤 Sent message: ${message}`, 'success');
        }
        
        function toggleTyping() {
            if (!socket || !isConnected) {
                log('Not connected to server', 'error');
                return;
            }
            
            if (isTyping) {
                socket.emit('typing_stop', { phone: 'test-phone' });
                log('⌨️ Stopped typing', 'info');
                isTyping = false;
            } else {
                socket.emit('typing_start', { phone: 'test-phone' });
                log('⌨️ Started typing', 'info');
                isTyping = true;
            }
        }
        
        function toggleHandoffMode() {
            if (!socket || !isConnected) {
                log('Not connected to server', 'error');
                return;
            }
            
            const btn = document.getElementById('handoffModeBtn');
            const isCurrentlyHuman = btn.textContent.includes('👤');
            const newHumanMode = !isCurrentlyHuman;
            
            socket.emit('toggle_live_mode', { 
                phone: 'test-phone', 
                isLive: newHumanMode 
            });
            
            btn.textContent = newHumanMode ? '👤 Human Mode' : '🤖 AI Mode';
            btn.classList.toggle('live-active', newHumanMode);
            
            log(`🔄 Handoff mode ${newHumanMode ? 'enabled (Human)' : 'disabled (AI)'}`, 'success');
        }
        
        function clearLog() {
            document.getElementById('eventLog').innerHTML = '';
            log('Log cleared', 'info');
        }
        
        // Auto-connect on page load
        window.addEventListener('load', () => {
            log('Page loaded, ready to test', 'info');
        });
    </script>
</body>
</html>
