<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #log { background: #f8f9fa; padding: 10px; height: 300px; overflow-y: auto; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <h1>Socket.IO Connection Test</h1>
    
    <div id="status" class="status info">Initializing...</div>
    
    <div>
        <button onclick="testConnection()">Test Connection</button>
        <button onclick="testJoinChat()">Test Join Chat</button>
        <button onclick="testSendMessage()">Test Send Message</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div id="log"></div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let isConnected = false;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
        
        function testConnection() {
            log('🔄 Testing Socket.IO connection...', 'info');
            
            if (socket) {
                socket.disconnect();
            }
            
            socket = io({
                auth: {
                    userId: 'test-user-123'
                },
                query: {
                    userId: 'test-user-123'
                },
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                isConnected = true;
                log('✅ Connected to Socket.IO server', 'success');
                updateStatus('Connected', 'success');
            });
            
            socket.on('disconnect', () => {
                isConnected = false;
                log('❌ Disconnected from Socket.IO server', 'error');
                updateStatus('Disconnected', 'error');
            });
            
            socket.on('connect_error', (error) => {
                log(`❌ Connection error: ${error.message}`, 'error');
                updateStatus('Connection Error', 'error');
            });
            
            socket.on('new_message', (data) => {
                log(`📨 New message received: ${JSON.stringify(data)}`, 'success');
            });
            
            socket.on('typing_start', (data) => {
                log(`⌨️ Typing started: ${JSON.stringify(data)}`, 'info');
            });
            
            socket.on('typing_stop', (data) => {
                log(`⌨️ Typing stopped: ${JSON.stringify(data)}`, 'info');
            });
        }
        
        function testJoinChat() {
            if (!socket || !isConnected) {
                log('❌ Not connected to server', 'error');
                return;
            }
            
            socket.emit('join_chat', { phone: '447312706087' });
            log('👤 Joined chat: 447312706087', 'info');
        }
        
        function testSendMessage() {
            if (!socket || !isConnected) {
                log('❌ Not connected to server', 'error');
                return;
            }
            
            socket.emit('send_message', { 
                phone: '447312706087', 
                message: 'Test message from browser',
                type: 'text'
            });
            log('📤 Sent test message', 'info');
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        // Auto-test connection on page load
        window.addEventListener('load', () => {
            log('🚀 Page loaded, testing connection...', 'info');
            testConnection();
        });
    </script>
</body>
</html>
